name: Build Show.exe

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17 (with JavaFX)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'liberica'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Build Frontend
      run: |
        cd frontend
        npm install
        npm run build
      shell: pwsh

    - name: Build Backend JAR
      run: mvn clean package -DskipTests
      shell: pwsh

    - name: List target JARs
      run: dir target\*.jar
      shell: cmd

    - name: Prepare jpackage input
      run: |
        New-Item -ItemType Directory -Force -Path target\jpackage-input
        Copy-Item target\ddmo-1.0.0-exec.jar target\jpackage-input\
      shell: pwsh

    - name: Package with jpackage (with JavaFX and console)
      run: |
        & "$env:JAVA_HOME\bin\jpackage.exe" `
          --type app-image `
          --input target\jpackage-input `
          --main-jar ddmo-1.0.0-exec.jar `
          --main-class com.ddmo.app.DdmoLauncher `
          --name Show `
          --dest dist `
          --java-options "-Xmx512m" `
          --win-console `
          --module-path "$env:JAVA_HOME\jmods" `
          --add-modules javafx.controls,javafx.web,javafx.base
      shell: pwsh

    - name: Test run Show.exe and capture log
      run: |
        cd dist\Show
        .\Show.exe > output.log 2>&1 &
        Start-Sleep -Seconds 5
        Stop-Process -Name "Show" -Force -ErrorAction SilentlyContinue
        Get-Content output.log
      shell: pwsh
      continue-on-error: true

    - name: Upload full app
      uses: actions/upload-artifact@v4
      with:
        name: Show-App
        path: dist/Show

    - name: Upload error log
      uses: actions/upload-artifact@v4
      with:
        name: Show-Error-Log
        path: dist/Show/output.log
